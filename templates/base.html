<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Início{% endblock %} - Renovo Cabeleireiros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><i class="fa-solid fa-scissors"></i> Renovo Cabeleireiros</div>
    <nav>
      <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.path == '/' else '' }}"><i class="fa-solid fa-house"></i> Início</a>
      <a href="{{ url_for('agendamentos') }}" class="{{ 'active' if '/agendamentos' in request.path else '' }}"><i class="fa-solid fa-calendar-check"></i> Agendamentos</a>
      <a href="{{ url_for('pagamentos') }}" class="{{ 'active' if '/pagamentos' in request.path else '' }}"><i class="fa-solid fa-money-bill-wave"></i> Pagamentos</a>
      <a href="{{ url_for('relatorios') }}" class="{{ 'active' if '/relatorios' in request.path else '' }}"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
      <a href="{{ url_for('estoque') }}" class="{{ 'active' if '/estoque' in request.path else '' }}"><i class="fa-solid fa-boxes-stacked"></i> Estoque</a>
    </nav>
  </aside>
  <main class="content">
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
<button class="mobile-nav-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
